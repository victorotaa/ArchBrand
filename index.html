<style>
:root{
  /* paleta real do Manual de Marca Victor Ota — #0F0F10 25% / #2C2C2C 30% / #C3A262 10% / #DAC5A5 20% / #F7F4E8 15% */
  --bg-canvas:#0F0F10; --bg-surface:#1C1C1D; --bg-elevated:#232324; --bg-overlay:#2C2C2C;
  --bg-hover:#333334; --bg-pressed:#3B3B3C;
  --border-subtle:rgba(247,244,232,.08); --border-default:rgba(247,244,232,.14); --border-strong:rgba(247,244,232,.22);
  --border-gold:rgba(195,162,98,.4);
  --gold:#C3A262; --gold-hover:#D4B47D; --gold-pressed:#9C8250;
  --tan:#DAC5A5;
  --text-primary:#F7F4E8; --text-secondary:#DAC5A5; --text-tertiary:#8C877D; --text-inverse:#0F0F10;
  --danger:#B54A3A; --success:#4F8A64;
  --font-display:'Red Hat Display',sans-serif; --font-body:'Red Hat Display',sans-serif; --font-mono:'Red Hat Display',sans-serif;
  --radius-sm:4px; --radius-md:6px; --radius-lg:8px; --radius-xl:12px;
  --ease-editorial:cubic-bezier(.22,1,.36,1);
  --sidebar-w:220px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg-canvas); color:var(--text-primary); font-family:var(--font-body); font-weight:300;
  min-height:100vh; -webkit-font-smoothing:antialiased;
}
::selection{background:var(--gold); color:var(--text-inverse);}
*:focus-visible{outline:2px solid var(--gold); outline-offset:2px; border-radius:var(--radius-md);}

.bg-fixed::after{
  content:''; position:absolute; inset:0; opacity:.35;
  background:radial-gradient(ellipse 90% 60% at 50% 100%, rgba(15,15,16,.85), transparent 60%);
}

/* liquid glass — vidro translúcido escurecido sobre o fundo fixo */
.glass{
  background:linear-gradient(155deg, rgba(44,44,44,.55), rgba(15,15,16,.7));
  backdrop-filter:blur(20px) saturate(140%); -webkit-backdrop-filter:blur(20px) saturate(140%);
  border:1px solid rgba(247,244,232,.10);
  box-shadow:0 1px 0 0 rgba(247,244,232,.06) inset, 0 8px 32px rgba(0,0,0,.35);
}

.topbar{
  position:fixed; top:0; left:0; right:0; z-index:10;
  display:flex; align-items:center; justify-content:center;
  padding:16px 32px; border-bottom:1px solid var(--border-subtle);
  background:linear-gradient(155deg, rgba(44,44,44,.45), rgba(15,15,16,.55));
  backdrop-filter:blur(20px) saturate(140%); -webkit-backdrop-filter:blur(20px) saturate(140%);
}
.brand-mark{
  font-weight:500; font-size:12px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--text-tertiary); display:flex; align-items:center; gap:14px; opacity:.85;
}
.brand-mark .ota-lockup-h{height:15px; width:auto; display:block;}
.brand-mark .ota-lockup-compact{height:34px; width:auto; display:block;}
.brand-mark .slogan{font-style:normal; letter-spacing:.1em;}
.brand-mark .sep{width:3px; height:3px; border-radius:50%; background:var(--text-tertiary); flex-shrink:0;}

.progress-track{position:fixed; top:0; left:0; right:0; height:2px; background:var(--border-subtle); z-index:11;}
.progress-fill{height:100%; background:var(--gold); transition:width .4s var(--ease-editorial);}

/* sidebar de progresso — somente visualização, sem navegação */
.progress-nav{
  position:fixed; left:0; top:0; bottom:0; width:var(--sidebar-w); z-index:9;
  padding:88px 24px 100px; display:flex; flex-direction:column; gap:2px;
  border-right:1px solid var(--border-subtle);
  background:linear-gradient(155deg, rgba(44,44,44,.4), rgba(15,15,16,.5));
  backdrop-filter:blur(20px) saturate(140%); -webkit-backdrop-filter:blur(20px) saturate(140%);
}
.progress-nav .pn-item{
  font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:500;
  color:var(--text-tertiary); padding:9px 0 9px 16px; position:relative; transition:color .2s;
}
.progress-nav .pn-item::before{
  content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
  width:6px; height:6px; border-radius:50%; background:var(--border-strong);
}
.progress-nav .pn-item.done{color:var(--text-secondary);}
.progress-nav .pn-item.done::before{background:var(--gold);}
.progress-nav .pn-item.active{color:var(--text-primary); font-weight:600;}
.progress-nav .pn-item.active::before{background:var(--gold); box-shadow:0 0 0 3px rgba(195,162,98,.25);}

.stage{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:120px 24px 140px; max-width:760px; margin:0 auto 0 calc(var(--sidebar-w) + 24px);
}
.card{width:100%; animation:rise .5s var(--ease-editorial);}
@keyframes rise{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}

@media(max-width:860px){
  .stage{margin:0 auto; padding:100px 20px 190px;}
  .progress-nav{
    left:0; right:0; bottom:74px; top:auto; width:auto; height:auto; border-right:none;
    border-top:1px solid var(--border-subtle); padding:10px 16px; flex-direction:row; gap:0;
    overflow-x:auto; justify-content:flex-start; z-index:9;
  }
  .progress-nav .pn-item{padding:6px 12px 6px 16px; white-space:nowrap; flex-shrink:0;}
}

.eyebrow{
  font-family:var(--font-mono); font-size:11px; font-weight:500; letter-spacing:.1em;
  text-transform:uppercase; color:var(--gold); margin-bottom:16px; display:block;
}
h1.q-title{font-family:var(--font-display); font-weight:700; font-size:clamp(22px,3.4vw,32px); line-height:1.3; margin:0 0 12px;}
.q-help{color:var(--text-secondary); font-size:15px; line-height:1.6; margin:0 0 28px;}
.statement-body{
  font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(20px,3vw,28px); line-height:1.45;
  color:var(--text-primary); margin-top:8px; letter-spacing:-.01em;
}

/* tela de introdução do método — lockup empilhado + roda dos arquétipos */
.intro-screen{display:flex; flex-direction:column; align-items:center; text-align:center; gap:22px;}
.intro-lockup .ota-lockup-compact{height:60px; width:auto; display:block;}
.intro-screen .eyebrow{margin:0;}
.wheel-img{width:100%; max-width:440px; height:auto; display:block; filter:drop-shadow(0 20px 50px rgba(0,0,0,.55));}
.intro-text{color:var(--text-secondary); font-size:16px; line-height:1.7; max-width:520px; margin:0;}
@media(max-width:860px){
  .intro-lockup .ota-lockup-compact{height:50px;}
  .wheel-img{max-width:300px;}
  .intro-text{font-size:15px;}
}

input[type=text],input[type=email],input[type=url],textarea,select{
  width:100%; background:linear-gradient(155deg, rgba(44,44,44,.5), rgba(15,15,16,.6));
  backdrop-filter:blur(14px) saturate(140%); -webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--border-default);
  border-radius:var(--radius-md); color:var(--text-primary); font-family:var(--font-body);
  font-size:16px; padding:14px 16px; transition:border-color .18s var(--ease-editorial), box-shadow .18s var(--ease-editorial);
}
textarea{min-height:120px; resize:vertical; line-height:1.6;}
input::placeholder,textarea::placeholder{color:var(--text-tertiary);}
input:focus,textarea:focus,select:focus{outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(195,162,98,.16);}

.option-grid{display:grid; gap:10px; margin-top:4px;}
.option{
  display:flex; align-items:center; gap:12px; padding:16px 18px;
  background:linear-gradient(155deg, rgba(44,44,44,.5), rgba(15,15,16,.6));
  backdrop-filter:blur(14px) saturate(140%); -webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--border-default); border-radius:var(--radius-md); cursor:pointer;
  transition:border-color .18s var(--ease-editorial), background .18s var(--ease-editorial);
  font-size:15px;
}
.option:hover{border-color:var(--border-gold); background:linear-gradient(155deg, rgba(51,51,52,.55), rgba(20,20,21,.65));}
.option.selected{border-color:var(--gold); background:linear-gradient(155deg, rgba(195,162,98,.14), rgba(15,15,16,.6));}
.option input{accent-color:var(--gold); width:16px; height:16px; flex-shrink:0;}
.option .opt-label{flex:1;}
.option .opt-label b{display:block; font-weight:600; margin-bottom:3px;}
.option .opt-label .opt-sub{display:block; font-size:13px; color:var(--text-tertiary); font-weight:400;}

.mini-fields{display:grid; gap:10px; margin-top:4px;}
.mini-fields input{padding:12px 14px;}

.scale-row{padding:18px 0; border-bottom:1px solid var(--border-subtle);}
.scale-row:first-child{padding-top:4px;}
.scale-row:last-child{border-bottom:none;}
.scale-name{font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:10px;}
.scale-track{display:flex; align-items:center; gap:8px;}
.scale-pole{font-size:12px; color:var(--text-secondary); flex:0 0 100px;}
.scale-pole.left{text-align:right;}
.scale-points{display:flex; gap:8px; flex:1; justify-content:center;}
.scale-point{
  width:36px; height:36px; border-radius:50%; border:1px solid var(--border-default);
  background:var(--bg-surface); cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:12px; color:var(--text-tertiary);
  transition:all .15s var(--ease-editorial);
}
.scale-point:hover{border-color:var(--border-gold);}
.scale-point.selected{background:var(--gold); border-color:var(--gold); color:var(--text-inverse);}

.checklist-grid{display:grid; grid-template-columns:1fr; gap:8px; margin-top:8px;}
@media(min-width:700px){.checklist-grid{grid-template-columns:1fr 1fr;}}
.chk-item{
  display:flex; align-items:flex-start; gap:10px; padding:12px 14px;
  background:linear-gradient(155deg, rgba(44,44,44,.5), rgba(15,15,16,.6));
  backdrop-filter:blur(14px) saturate(140%); -webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--border-default); border-radius:var(--radius-sm); cursor:pointer; font-size:13.5px;
  line-height:1.4; transition:border-color .15s;
}
.chk-item:hover{border-color:var(--border-gold);}
.chk-item.selected{border-color:var(--gold); background:linear-gradient(155deg, rgba(195,162,98,.14), rgba(15,15,16,.6));}
.chk-item input{margin-top:2px; accent-color:var(--gold); flex-shrink:0;}

.nav-bar{
  position:fixed; bottom:0; left:0; right:0; z-index:10;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:20px 32px 20px calc(var(--sidebar-w) + 32px);
  background:linear-gradient(155deg, rgba(44,44,44,.45), rgba(15,15,16,.55));
  backdrop-filter:blur(20px) saturate(140%); -webkit-backdrop-filter:blur(20px) saturate(140%);
  border-top:1px solid var(--border-subtle);
}
@media(max-width:860px){ .nav-bar{padding:14px 24px; z-index:10;} }
button{
  font-family:var(--font-mono); font-weight:500; font-size:13px; letter-spacing:.06em;
  text-transform:uppercase; cursor:pointer; border-radius:var(--radius-md); transition:all .18s var(--ease-editorial);
}
.btn-primary{
  background:transparent; border:1px solid var(--gold); color:var(--gold); padding:14px 32px;
}
.btn-primary:hover{background:rgba(195,162,98,.1);}
.btn-primary:disabled{opacity:.35; cursor:not-allowed;}
.btn-ghost{background:transparent; border:1px solid transparent; color:var(--text-tertiary); padding:14px 20px;}
.btn-ghost:hover{color:var(--text-secondary);}

.data-card{
  background:linear-gradient(155deg, rgba(44,44,44,.55), rgba(15,15,16,.7));
  backdrop-filter:blur(20px) saturate(140%); -webkit-backdrop-filter:blur(20px) saturate(140%);
  border:1px solid var(--border-default); border-top:2px solid var(--gold);
  border-radius:var(--radius-lg); padding:24px; margin-bottom:16px;
}
.data-card .dc-eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold-hover); margin-bottom:8px;}
.data-card .dc-value{font-family:var(--font-mono); font-weight:600; font-size:36px; color:var(--text-primary); line-height:1;}
.data-card .dc-label{font-size:13px; color:var(--text-secondary); margin-top:6px;}

.result-archetype{
  display:flex; align-items:baseline; gap:16px; padding:20px 0; border-bottom:1px solid var(--border-subtle);
}
.result-archetype .rank{font-family:var(--font-display); font-weight:800; font-size:40px; color:var(--gold);}
.result-archetype .name{font-family:var(--font-display); font-weight:700; font-size:22px;}
.result-archetype .count{font-family:var(--font-mono); font-size:12px; color:var(--text-tertiary); margin-left:auto;}

.signal-row{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border-subtle); font-size:14px;}
.signal-row .k{color:var(--text-tertiary); font-family:var(--font-mono); font-size:12px; text-transform:uppercase; letter-spacing:.04em;}
.signal-row .v{color:var(--text-primary); text-align:right; max-width:60%;}
</style>
</head>

function renderSidebar(currentSection){
  const currentStage = STAGE_MAP[currentSection] || STAGES[0];
  const currentIdx = STAGES.indexOf(currentStage);
  document.getElementById('progressNav').innerHTML = STAGES.map((s,i)=>{
    const cls = i===currentIdx ? 'active' : (i<currentIdx ? 'done' : '');
    return `<div class="pn-item ${cls}">${s}</div>`;
  }).join('');
}

  for(let i=0;i<6;i++){

  }
  return out;
}

// ── Persistência (localStorage) + envio das respostas ────────────────
// Cole aqui a URL do seu formulário (Formspree/Basin), ex.:
//   'https://formspree.io/f/abcdwxyz'  ou  'https://usebasin.com/f/xxxxxxxx'
// Enquanto estiver vazio, "Concluir" apenas baixa o .json (sem enviar e-mail).
const SUBMIT_ENDPOINT = '';
const STORAGE_KEY = 'chronos_briefing_v1';

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({ i:state.i, answers:state.answers })); }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    if(saved && saved.answers && typeof saved.i==='number'){
      state.answers = saved.answers;
      const max = visibleQuestions().length-1;
      state.i = Math.max(0, Math.min(saved.i, max));
    }
  }catch(e){}
}
function clearState(){ try{ localStorage.removeItem(STORAGE_KEY); }catch(e){} }
function hasSaved(){ try{ return !!localStorage.getItem(STORAGE_KEY); }catch(e){ return false; } }
function resetBriefing(){
  if(!confirm('Recomeçar do zero? As respostas salvas neste navegador serão apagadas.')) return;
  clearState(); state.i=0; state.answers={}; window.scrollTo(0,0); render();
}
function stashInput(id){
  const el = document.getElementById('f_'+id);
  if(el){ state.answers[id] = el.value; saveState(); }
}

function visibleQuestions(){
  return QUESTIONS.filter(q => !q.cond || q.cond(state.answers));
}
function currentQuestion(){ return visibleQuestions()[state.i]; }

function render(){
  saveState();
  const list = visibleQuestions();
  const q = list[state.i];
  const card = document.getElementById('card');
  renderSidebar(q.section);
  document.getElementById('progressFill').style.width = ((state.i)/(list.length-1)*100)+'%';
  document.getElementById('btnBack').style.visibility = state.i===0 ? 'hidden':'visible';

  let html;
  const title = q.dynamicTitle ? q.dynamicTitle(state.answers) : q.title;
  if(q.type==='intro'){
    html = `<div class="intro-screen">`
      + `<div class="intro-lockup">${OTA_LOCKUP_COMPACT}</div>`
      + `<span class="eyebrow">O Método · Arquétipos de Marca</span>`
      + `<img class="wheel-img" src="${WHEEL_ARQUETIPOS}" alt="Roda dos 12 arquétipos de marca, organizados em quatro quadrantes: Plenitude, Maestria, Pertencimento e Estabilidade">`
      + `<p class="intro-text">Toda marca carrega um arquétipo — um padrão simbólico que molda como ela é percebida e sentida. Este briefing conduz você pelo meu método autoral: da base do negócio à personalidade, até revelar o arquétipo predominante da sua marca. Reserve alguns minutos e responda com honestidade — marca que marca nasce de respostas verdadeiras.</p>`
      + (hasSaved() ? `<p class="intro-text" style="font-size:13px; color:var(--text-tertiary);">Você tem respostas salvas neste navegador — é só continuar. <button onclick="resetBriefing()" style="background:none;border:none;color:var(--text-tertiary);font-size:13px;text-decoration:underline;cursor:pointer;padding:0;">recomeçar do zero</button></p>` : '')
      + `</div>`;
    card.innerHTML = html;
    const btnNext = document.getElementById('btnNext');
    btnNext.textContent = 'Começar →';
    btnNext.onclick = goNext;
    return;
  }
  if(q.type==='statement'){
    html = `<span class="eyebrow">${q.section}</span><p class="statement-body">"${title}"</p>`;
    card.innerHTML = html;
    const btnNext = document.getElementById('btnNext');
    btnNext.textContent = 'Continuar →';
    btnNext.onclick = goNext;
    return;
  }
  html = `<span class="eyebrow">${q.section}</span><h1 class="q-title">${title}</h1>`;
  if(q.help) html += `<p class="q-help">${q.help}</p>`;

  if(q.type==='text' || q.type==='email' || q.type==='url'){
    html += `<input type="${q.type}" id="f_${q.id}" value="${state.answers[q.id]||''}" placeholder="${q.placeholder||'Sua resposta'}" oninput="stashInput('${q.id}')">`;
  } else if(q.type==='textarea'){
    html += `<textarea id="f_${q.id}" placeholder="${q.placeholder||'Sua resposta'}" oninput="stashInput('${q.id}')">${state.answers[q.id]||''}</textarea>`;
  } else if(q.type==='radio'){
    const opts = q.dynamicOptions ? q.dynamicOptions(state.answers) : q.options;
    html += `<div class="option-grid">` + opts.map(o=>{
      const sel = state.answers[q.id]===o.v ? 'selected':'';
      const labelHtml = o.sub ? `<b>${o.label}</b><span class="opt-sub">${o.sub}</span>` : o.label;
      return `<label class="option ${sel}" onclick="selectRadio('${q.id}','${o.v.replace(/'/g,"\\'")}')"><input type="radio" name="${q.id}" ${sel?'checked':''}><span class="opt-label">${labelHtml}</span></label>`;
    }).join('') + `</div>`;
  } else if(q.type==='select'){
    const opts = q.dynamicOptions ? q.dynamicOptions(state.answers) : q.options;
    html += `<select id="f_${q.id}"><option value="">Selecione...</option>` + opts.map(o=>`<option value="${o.v}" ${state.answers[q.id]===o.v?'selected':''}>${o.label}</option>`).join('') + `</select>`;
  } else if(q.type==='checkbox'){
    const cur = state.answers[q.id] || [];
    html += `<div class="option-grid">` + q.options.map(o=>{
      const sel = cur.includes(o.v) ? 'selected':'';
      return `<label class="option ${sel}" onclick="toggleCheckbox('${q.id}','${o.v.replace(/'/g,"\\'")}')"><input type="checkbox" ${sel?'checked':''}><span class="opt-label">${o.label}</span></label>`;
    }).join('') + `</div>`;
  } else if(q.type==='scale-grid'){
    html += q.scales.map(s=>{
      const val = (state.answers.scales||{})[s.id];
      let pts = '';
      for(let p=1;p<=s.points;p++){
        const sel = val===p ? 'selected':'';
        pts += `<div class="scale-point ${sel}" onclick="selectScale('${s.id}',${p})">${p}</div>`;
      }
      const subHelp = s.help ? `<div class="q-help" style="margin:6px 0 0; font-size:13px;">${s.help}</div>` : '';
      return `<div class="scale-row"><div class="scale-name">${s.id.replace(/_/g,' ')}</div><div class="scale-track"><span class="scale-pole left">${s.left}</span><div class="scale-points">${pts}</div><span class="scale-pole">${s.right}</span></div>${subHelp}</div>`;
    }).join('');
  } else if(q.type==='archetype-checklist'){
    const cur = state.answers.arq_checklist_ids || [];
    html += `<div class="checklist-grid">` + STATEMENTS_FLAT.map((s,idx)=>{
      const sel = cur.includes(idx) ? 'selected':'';
      return `<label class="chk-item ${sel}" onclick="toggleArchStatement(${idx})"><input type="checkbox" ${sel?'checked':''}><span>${s.text}</span></label>`;
    }).join('') + `</div>`;
  } else if(q.type==='result'){
    html += renderResult();
  }

  card.innerHTML = html;
  const btnNext = document.getElementById('btnNext');
  if(q.type==='result'){
    btnNext.textContent = SUBMIT_ENDPOINT ? 'Enviar respostas →' : 'Baixar respostas (.json)';
    btnNext.disabled = false;
    btnNext.onclick = SUBMIT_ENDPOINT ? finish : downloadResults;
  } else {
    btnNext.textContent = (state.i===list.length-2) ? 'Ver resultado →' : 'Continuar →';
    btnNext.onclick = goNext;
  }
}

function selectRadio(id,val){ state.answers[id]=val; render(); }
function selectScale(id,val){ if(!state.answers.scales) state.answers.scales={}; state.answers.scales[id]=val; render(); }
function toggleCheckbox(id,val){
  if(!state.answers[id]) state.answers[id]=[];
  const arr = state.answers[id];
  const i = arr.indexOf(val);
  if(i>-1) arr.splice(i,1); else arr.push(val);
  render();
}
function toggleArchStatement(idx){
  if(!state.answers.arq_checklist_ids) state.answers.arq_checklist_ids=[];
  const arr = state.answers.arq_checklist_ids;
  const i = arr.indexOf(idx);
  if(i>-1) arr.splice(i,1); else arr.push(idx);
  render();
}

function currentValue(q){
  if(q.type==='text'||q.type==='email'||q.type==='url'||q.type==='textarea'||q.type==='select'){
    const el = document.getElementById('f_'+q.id);
    return el ? el.value.trim() : '';
  }
  return null;
}

function goNext(){
  const q = currentQuestion();
  if(['text','email','url','textarea','select'].includes(q.type)){
    state.answers[q.id] = currentValue(q);
  }
  const list = visibleQuestions();
  if(state.i < list.length-1){ state.i++; window.scrollTo(0,0); render(); }
}
function goBack(){
  if(state.i>0){ state.i--; render(); }
}

function computeArchetypeScores(){
  const scores = {A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0,I:0,J:0,K:0,L:0};
  (state.answers.arq_checklist_ids||[]).forEach(idx=>{ scores[STATEMENTS_FLAT[idx].letter]++; });
  return scores;
}

function renderResult(){
  const scores = computeArchetypeScores();
  const ranked = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const top2 = ranked.slice(0,2).filter(r=>r[1]>0);

  let html = `<div style="margin-bottom:28px;">`;
  if(top2.length===0){
    html += `<p class="q-help">Nenhuma afirmação foi marcada no checklist — volte e marque ao menos algumas pra revelar o arquétipo predominante.</p>`;
  } else {
    top2.forEach((r,idx)=>{
      html += `<div class="result-archetype"><span class="rank">${idx+1}º</span><span class="name">${ARCH[r[0]].name} <span style="color:var(--text-tertiary); font-size:13px;">(${ARCH[r[0]].quadrant})</span></span><span class="count">${r[1]} de 6 afirmações</span></div>`;
    });
  }
  html += `</div>`;

  html += `<p class="scale-name" style="margin-bottom:12px;">OUTROS SINAIS PRA CRUZAR (o resultado é revelador, não determinístico)</p>`;
  const q = QUADRANTS.find(q=>q.v===state.answers.arq_quadrante);
  const rec = RECOGNITION_PHRASES.find(r=>r.v===state.answers.pers_onde_passar);
  const comm = COMM_STYLE.find(c=>c.v===state.answers.persona_comunicacao);
  html += `<div class="signal-row"><span class="k">Quadrante escolhido</span><span class="v">${q?q.label:'—'}</span></div>`;
  html += `<div class="signal-row"><span class="k">Refino (dropdown)</span><span class="v">${state.answers.arq_refino ? ARCH[state.answers.arq_refino].name : '—'}</span></div>`;
  html += `<div class="signal-row"><span class="k">Estilo de comunicação do cliente</span><span class="v">${comm ? comm.label+' → '+ARCH[comm.v].name : '—'}</span></div>`;
  html += `<div class="signal-row"><span class="k">"Por onde passar"</span><span class="v">${rec ? rec.label : '—'}</span></div>`;

  html += `<div id="sentMsg" style="margin-top:18px;"></div>`;
  html += `<div style="margin-top:20px;"><a href="#" onclick="downloadResults();return false;" style="color:var(--text-tertiary); font-size:13px; text-decoration:underline;">baixar as respostas em .json</a></div>`;

  return html;
}

function buildPayload(){
  const scores = computeArchetypeScores();
  const ranked = Object.entries(scores).sort((a,b)=>b[1]-a[1]).filter(r=>r[1]>0).slice(0,2).map(r=>({letra:r[0], nome:ARCH[r[0]].name, quadrante:ARCH[r[0]].quadrant, contagem:r[1]}));
  return {
    respondido_em: new Date().toISOString(),
    respostas: state.answers,
    arquetipo_predominante: ranked
  };
}

function showSent(ok){
  const el = document.getElementById('sentMsg');
  if(!el) return;
  el.innerHTML = ok
    ? `<p style="color:var(--success); font-size:14px; margin:0;">✓ Respostas enviadas. Obrigado! Se quiser, baixe uma cópia abaixo.</p>`
    : `<p style="color:var(--danger); font-size:14px; margin:0;">Não consegui enviar automaticamente. Baixe o arquivo .json abaixo e envie ao responsável pela marca.</p>`;
}

async function finish(){
  if(!SUBMIT_ENDPOINT){ downloadResults(); return; }
  const btn = document.getElementById('btnNext');
  const payload = buildPayload();
  btn.disabled = true; btn.textContent = 'Enviando…';
  try{
    const res = await fetch(SUBMIT_ENDPOINT, {
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    clearState();
    btn.disabled = false;
    btn.textContent = '✓ Enviado — baixar cópia (.json)';
    btn.onclick = downloadResults;
    showSent(true);
  }catch(e){
    btn.disabled = false;
    btn.textContent = 'Baixar respostas (.json)';
    btn.onclick = downloadResults;
    showSent(false);
  }
}

function downloadResults(){
  const payload = buildPayload();
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const aTag = document.createElement('a');
  aTag.href = url; aTag.download = 'briefing-marca-'+(state.answers.nome||'respondente').replace(/\s+/g,'-').toLowerCase()+'.json';
  document.body.appendChild(aTag); aTag.click(); aTag.remove();
  URL.revokeObjectURL(url);
}

loadState();
render();
</script>
</body>
</html>
